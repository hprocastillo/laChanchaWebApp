<!-- DESCRIPTION -->
<div class="row">
  <div class="col-12 p-0 text-start">
    <p class="mb-1 lead fw-bold">{{bag.description}}</p>
  </div>
</div>

<div class="row">
  <!-- DETAILS -->
  <div class="col-7 p-0 text-start">
    <p class="mb-0 small text-muted">
      <i class="bi bi-person-circle me-1"></i>
      {{bag.userDisplayName}}
    </p>
    <p class="mb-0 small text-muted">
      <i class="bi bi-calendar2-week me-1"></i>
      2 de mayo de 2022
    </p>
  </div>

  <!-- AMOUNT -->
  <div class="col-5 p-0 text-end">
    <p class="mb-0 lead fw-bold" [ngStyle]="{'color': bag.collectedAmount < bag.targetAmount ? 'red':'green'}">
      S/. {{bag.collectedAmount}}</p>
    <p class="mb-0 fw-bold">S/. {{bag.targetAmount}}</p>
  </div>
</div>
