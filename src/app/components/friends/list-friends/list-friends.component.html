<app-title [title]="'Mis Amigos'"></app-title>

<ng-container *ngIf="listFriends.length > 0; else noResults">
  <ul class="list-group list-group-flush">
    <li class="list-group-item p-1 border-0" style="cursor: pointer" *ngFor="let friend of listFriends"
        (click)="getSelectedFriend(friend)">

      <app-list-friends-item [friend]="friend"></app-list-friends-item>

    </li>
  </ul>
</ng-container>

<ng-template #noResults>
  <ngb-alert [dismissible]="false" [type]="'success'">
    No tienes amigos aún.
  </ngb-alert>
</ng-template>
