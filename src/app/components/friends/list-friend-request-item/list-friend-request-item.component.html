<div class="shadow p-3 mb-3 bg-body-tertiary rounded border-0">

  <div class="w-100 d-flex justify-content-start">
    <img style="width: 48px" class="rounded-circle" referrerpolicy="no-referrer" src="{{friendRequest.userPhotoUrl}}" alt="">
    <p class="m-auto ms-2">{{friendRequest.userDisplayName | titlecase}}</p>
  </div>
  <br>

  <div class="w-100 d-flex justify-content-center">
    <app-button
      (click)="rejectRequest(friendRequest)"
      [type]="'button'"
      [class]="'btn btn-danger me-2'"
      [icon]="'bi bi-x-circle-fill me-1'"
      [label]="'Rechazar'"
    ></app-button>

    <app-button
      (click)="agreeRequest(friendRequest)"
      [type]="'button'"
      [class]="'btn btn-success'"
      [icon]="'bi bi-check-circle-fill'"
      [label]="'Aceptar'"
    ></app-button>
  </div>
</div>
