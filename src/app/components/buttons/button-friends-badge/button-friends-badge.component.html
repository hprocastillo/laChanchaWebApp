<!-- BUTTON REQUEST BADGE -->
<ng-container *ngIf="listRequests.length > 0; else noRequests">
  <button type="button" class="btn btn-warning">
    <i class="bi bi-people-fill me-1"></i>
    Amigos
    <span class="badge text-bg-danger ms-1">{{listRequests.length}}</span>
  </button>
</ng-container>


<!-- BUTTON FRIENDS -->
<ng-template #noRequests>
  <button type="button" class="btn btn-warning">
    <i class="bi bi-people-fill me-1"></i>
    Amigos
  </button>
</ng-template>
