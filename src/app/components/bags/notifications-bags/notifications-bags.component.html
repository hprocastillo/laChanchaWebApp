<ng-container *ngIf="listShareBagsRequest.length > 0">

  <ngb-alert [dismissible]="false" [animation]="true" [type]="'warning'">
    <p class="m-0" style="cursor: pointer" (click)="goShareBagRequest()">Tienes
      <strong>{{listShareBagsRequest.length}}</strong> invitación a una chancha.</p>
  </ngb-alert>

</ng-container>
