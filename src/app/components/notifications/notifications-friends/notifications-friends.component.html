<ng-container *ngIf="listFriendsRequest.length > 0">

  <ngb-alert [animation]="true" [dismissible]="false" [type]="'warning'">
    <p class="m-0" style="cursor: pointer" (click)="goListFriendsRequest()">Tienes
      <strong>{{listFriendsRequest.length}}</strong> solicitudes de amistad.</p>
  </ngb-alert>

</ng-container>
