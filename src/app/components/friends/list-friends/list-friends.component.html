<ng-container *ngIf="listFriends.length > 0; else noResults">
  <ul class="list-group list-group-flush">
    <li style="cursor: pointer;" class="list-group-item border-0" *ngFor="let friend of listFriends"
        (click)="getSelectedFriend(friend)">

      <app-list-friends-item [friend]="friend"></app-list-friends-item>

    </li>
  </ul>
</ng-container>


<ng-template #noResults>
  <ngb-alert [dismissible]="true" [type]="'success'">
    No tienes amigos aún. <strong>Agrega uno.</strong>
  </ngb-alert>
</ng-template>
