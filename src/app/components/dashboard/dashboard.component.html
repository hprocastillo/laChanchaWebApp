<ng-container *ngIf="authService.user$ | async as user">

  <!-------------------------------->
  <!----------- LIST BAGS ---------->
  <app-list-bags
    *ngIf="listBagsTemplate"
    [user]="user"
    (selectedBag)="getSelectedBag($event)"
  ></app-list-bags>


  <!-------------------------------->
  <!----------- NEW BAG ------------>
  <app-new-bag
    *ngIf="newBagTemplate"
    [user]="user"
    (btnBack)="showListBagsTemplate()"
  ></app-new-bag>


  <!--------------------------------->
  <!----------- VIEW BAG ------------>
  <app-view-bag
    *ngIf="viewBagTemplate"
    [user]="user"
    [bag]="selectedBag"
  ></app-view-bag>


  <!------------------------------------>
  <!----------- NEW EXPENSE ------------>
  <app-new-expense
    *ngIf="newExpenseTemplate"
    [user]="user"
    [bag]="selectedBag"
    (btnBackToViewBag)="showViewBagTemplate()"
  ></app-new-expense>


  <!----------------------------------------->
  <!----------- FRIENDS TEMPLATE ------------>
  <app-friends
    *ngIf="friendsTemplate"
    [user]="user"
    (btnListFriendRequests)="showListFriendsRequest()"
    (selectedFriend)="getSelectedFriend($event)"
  ></app-friends>


  <!------------------------------------------->
  <!--------- LIST FRIENDS REQUEST ------------>
  <app-list-friend-request
    *ngIf="listFriendsRequestTemplate"
    [user]="user"
    (btnBack)="showFriendsTemplate()"
  ></app-list-friend-request>


  <!-------------------------------->
  <!---------- BUTTON BAR ---------->
  <app-button-bar
    *ngIf="buttonBarTemplate"
    [user]="user"

    (btnNewBag)="showNewBagTemplate()"
    [listBagsTemplate]="listBagsTemplate"
    [viewBagTemplate]="viewBagTemplate"
    (btnBackToListBags)="showListBagsTemplate()"

    [friendsTemplate]="friendsTemplate"
    (btnFriends)="showFriendsTemplate()"

    (btnNewExpense)="showNewExpenseTemplate()"
  ></app-button-bar>

</ng-container>
